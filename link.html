<!DOCTYPE html>
<html lang="uk">
<link rel="stylesheet" href="style.css">
<body>
<div class="registration-container">
    <form class="registration-form">
        <h2>Створити акаунт</h2>
        <p class="subtitle">Приєднуйтесь до нашої спільноти</p>
        
        <div class="input-group">
            <label for="username">Ім'я користувача</label>
            <input type="text" id="username" placeholder="Введіть ваше ім'я" required>
        </div>

        <div class="input-group">
            <label for="email">Електронна пошта</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>

        <div class="input-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-submit">Зареєструватися</button>
        
        <p class="login-link">Вже маєте акаунт? <a href="#">Увійти</a></p>
    </form>
</div>
</body>
